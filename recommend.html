<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PixelPlate. Discover and reserve game-themed restaurants.">
    <meta name="author" content="Evan McNicol">
    <title>PixelPlate - Where Gaming Meets Dining</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- header -->
    <header class="site-header">
        <a href="index.html" class="logo"><span class="site-name">PixelPlate</span></a>
        <button class="menu-toggle" type="button">
            <span class="hamburger"></span>
        </button>
        <nav class="site-nav" id="primary-navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="restaurants.html">Restaurants</a></li>
                <li><a href="recommend.html" class="active">Recommendations</a></li>
                <li><a href="register.html">Register</a></li>
                <li class="mobile-only"><a href="reservation.html">Reservation</a></li>
            </ul>
        </nav>
        <a href="reservation.html" class="btn btn-primary">Reservation</a>
    </header>
    <!-- recommendation form -->
    <main class="form-page">
        <section>
            <h1>Find your next restaurant</h1>
            <form id="recommendForm" novalidate>
                <p>
                    <label for="dietPreferences">Dietary Preferences *</label><br>
                    <select id="dietPreferences" name="dietPreferences" required="required">
                        <option value="" disabled selected>Please choose an option</option>
                        <option value="none">None</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="vegan">Vegan</option>
                        <option value="halal">Halal</option>
                        <option value="glutenFree">Gluten-Free</option>
                        <option value="dairyFree">Dairy-Free</option>
                    </select>
                </p>

                <p>
                    <label for="budget">Budget Range *</label>
                    <select id="budget" name="budget" required>
                        <option value="" disabled selected>Please choose an option</option>
                        <option value="low">$20-$40</option>
                        <option value="medium">$40-$70</option>
                        <option value="high">$70+</option>
                    </select>
                </p>

                <p>
                    <label for="purpose">Dining Purpose *</label>
                    <select id="purpose" name="purpose" required>
                        <option value="" disabled selected>Please choose an option</option>
                        <option value="family">Family</option>
                        <option value="date">Date</option>
                        <option value="business">Business</option>
                        <option value="group">Group dining</option>
                    </select>
                </p>

                <p>
                    <input type="submit" value="Get Recommendation">
                </p>
            </form>
        </section>
    </main>
    <!-- footer -->
    <footer class="site-footer">
        <small class="copyright">&copy; 2026 PixelPlate</small>
        <span class="credit">A web development project for Swinburne University of Technology.</span>
    </footer>
    <script src="js/script.js"></script>
</body>

</html>
